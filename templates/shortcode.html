<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDA Research Platform - Shortcode</title>
    <style>
        .ida-shortcode-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .ida-shortcode-header {
            background: linear-gradient(135deg, #0d6efd 0%, #6610f2 100%);
            color: white;
            padding: 15px 20px;
            text-align: center;
        }
        
        .ida-shortcode-header h3 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
        }
        
        .ida-shortcode-header p {
            margin: 5px 0 0 0;
            opacity: 0.9;
            font-size: 0.9rem;
        }
        
        .ida-shortcode-frame {
            width: 100%;
            height: 800px;
            border: none;
            background: #f8f9fa;
        }
        
        .ida-shortcode-footer {
            background: #f8f9fa;
            padding: 10px 20px;
            text-align: center;
            font-size: 0.8rem;
            color: #6c757d;
            border-top: 1px solid #dee2e6;
        }
        
        .ida-shortcode-footer a {
            color: #0d6efd;
            text-decoration: none;
        }
        
        .ida-shortcode-footer a:hover {
            text-decoration: underline;
        }
        
        /* Responsive design */
        @media (max-width: 768px) {
            .ida-shortcode-container {
                margin: 10px;
                max-width: calc(100% - 20px);
            }
            
            .ida-shortcode-frame {
                height: 600px;
            }
            
            .ida-shortcode-header h3 {
                font-size: 1.3rem;
            }
        }
        
        /* Loading state */
        .ida-shortcode-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            background: #f8f9fa;
            color: #6c757d;
            font-size: 1rem;
        }
        
        .ida-shortcode-loading::after {
            content: '';
            width: 20px;
            height: 20px;
            margin-left: 10px;
            border: 2px solid #6c757d;
            border-top: 2px solid #0d6efd;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="ida-shortcode-container" id="idaShortcode">
        <div class="ida-shortcode-header">
            <h3>🔬 IDA - Intelligent Data Analytics</h3>
            <p>AI-Powered Research & Analysis Platform</p>
        </div>
        
        <div class="ida-shortcode-loading" id="idaLoading">
            Loading IDA Platform...
        </div>
        
        <iframe 
            id="idaFrame"
            class="ida-shortcode-frame" 
            src=""
            title="IDA Research Platform"
            style="display: none;"
            onload="showFrame()"
        ></iframe>
        
        <div class="ida-shortcode-footer">
            Powered by <a href="#" target="_blank">IDA Research Platform</a> | 
            <a href="#" onclick="toggleFullscreen()">⛶ Fullscreen</a> | 
            <a href="#" onclick="refreshFrame()">🔄 Refresh</a>
        </div>
    </div>

    <script>
        // Configuration - Update these URLs to match your deployment
        const IDA_BASE_URL = window.location.origin; // Uses current domain
        // Alternative: const IDA_BASE_URL = 'https://your-ida-domain.replit.app';
        
        // Initialize the shortcode
        function initializeIDA() {
            const frame = document.getElementById('idaFrame');
            const loading = document.getElementById('idaLoading');
            
            // Set the iframe source
            frame.src = IDA_BASE_URL;
            
            // Show frame after a brief delay
            setTimeout(() => {
                loading.style.display = 'none';
                frame.style.display = 'block';
            }, 1000);
        }
        
        // Show frame when loaded
        function showFrame() {
            const loading = document.getElementById('idaLoading');
            const frame = document.getElementById('idaFrame');
            
            loading.style.display = 'none';
            frame.style.display = 'block';
        }
        
        // Toggle fullscreen mode
        function toggleFullscreen() {
            const container = document.getElementById('idaShortcode');
            const frame = document.getElementById('idaFrame');
            
            if (container.classList.contains('fullscreen')) {
                // Exit fullscreen
                container.classList.remove('fullscreen');
                container.style.position = '';
                container.style.top = '';
                container.style.left = '';
                container.style.width = '';
                container.style.height = '';
                container.style.zIndex = '';
                frame.style.height = '800px';
            } else {
                // Enter fullscreen
                container.classList.add('fullscreen');
                container.style.position = 'fixed';
                container.style.top = '0';
                container.style.left = '0';
                container.style.width = '100vw';
                container.style.height = '100vh';
                container.style.zIndex = '9999';
                frame.style.height = 'calc(100vh - 120px)';
            }
        }
        
        // Refresh the iframe
        function refreshFrame() {
            const frame = document.getElementById('idaFrame');
            const loading = document.getElementById('idaLoading');
            
            loading.style.display = 'flex';
            frame.style.display = 'none';
            
            // Reload the iframe
            frame.src = frame.src;
        }
        
        // Handle escape key for fullscreen exit
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                const container = document.getElementById('idaShortcode');
                if (container.classList.contains('fullscreen')) {
                    toggleFullscreen();
                }
            }
        });
        
        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', initializeIDA);
    </script>
</body>
</html>
