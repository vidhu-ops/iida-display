{% extends "base.html" %}

{% block title %}IIda: Login{% endblock %}

{% block content %}
<div class="container bg-black my-5">
    <div class="row">
        <div class="col-lg-5 mx-auto">
            <div class="card bg-black shadow-lg border-black">
                <div class="card-header bg-black text-white text-center py-4">
                    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="mb-3" style="height: 60px; width: 60px; border-radius: 50%; border: 2px solid white;">
                    <h4 class="card-title mb-0">
                        Login to IIDATECH
                    </h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST" action="{{ url_for('login') }}">
                        <div class="mb-3">
                            <label for="username" class="form-label fw-bold">Username</label>
                            <input type="text" class="form-control" id="username" name="username" required autofocus>
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" class="form-label fw-bold">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="fas fa-sign-in-alt me-2"></i>
                                Login
                            </button>
                        </div>
                    </form>
                    <hr class="my-4">
                    
                    <p class="text-center text-muted">
                        Don't have an account?
                        <a href="{{ url_for('register') }}" class="text-primary fw-bold">
                            Register here
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
