{% extends "base.html" %}

{% block title %}IIda: Home{% endblock %}

{% block content %}
<style>
    body, html {
        margin: 0;
        padding: 0;
        overflow: hidden;
    }

    .home-container {
        position: fixed;
        top: 56px;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        flex-direction: column;
        background: #1a1a1a; /* Match IDA dark theme instead of white */
    }

    .iframe-wrapper {
        flex: 1;
        overflow: hidden;
        position: relative;
        background: #1a1a1a;
    }

    iframe {
        width: 100%;
        height: calc(100% + 80px); /* Extend height to account for the top offset */
        border: none;
        position: absolute;
        top: -80px;
        left: 0;
    }

    .loading-indicator {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        display: none;
        z-index: 10;
    }

    .loading-indicator.show {
        display: block;
    }

    .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid #000000;
        border-top: 4px solid #667eea;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    .loading-text {
        color: #667eea;
        font-weight: 600;
        font-size: 1.1rem;
    }
</style>

<div class="home-container">

    <div class="iframe-wrapper">
        <div class="loading-indicator show">
            <div class="spinner"></div>
            <div class="loading-text">Loading...</div>
        </div>
        <iframe src="https://vidhugupta1996.wixstudio.com/my-site-5" id="contentFrame"></iframe>
    </div>
</div>

<script>
    // Hide loading indicator when iframe loads
    document.getElementById('contentFrame').addEventListener('load', function() {
        const loader = document.querySelector('.loading-indicator');
        loader.classList.remove('show');
    });

    // Show loading indicator if it takes a while
    setTimeout(() => {
        const loader = document.querySelector('.loading-indicator');
        if (loader.classList.contains('show')) {
            loader.style.opacity = '0.7';
        }
    }, 5000);
</script>
{% endblock %}
